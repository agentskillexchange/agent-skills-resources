name: Resource addition
description: Suggest a source-backed resource for the companion guide.
title: "Resource: "
labels: ["resource"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for companion resources only. Submit actual skills to agentskillexchange/skills.
  - type: input
    id: source_url
    attributes:
      label: Source URL
      description: Link to the documentation, repository, guide, or resource.
    validations:
      required: true
  - type: dropdown
    id: source_label
    attributes:
      label: Proposed source label
      options:
        - Official
        - Lab
        - Community
        - ASE
    validations:
      required: true
  - type: textarea
    id: ownership_evidence
    attributes:
      label: Ownership/source label evidence
      description: Explain why this is Official, Lab, Community, or ASE.
    validations:
      required: true
  - type: input
    id: framework_workflow
    attributes:
      label: Related framework or workflow
      placeholder: Codex, Claude Code, OpenClaw, MCP, security, SRE, data, etc.
    validations:
      required: true
  - type: textarea
    id: why_belongs
    attributes:
      label: Why it belongs here
      description: Explain why this belongs in the companion resource hub.
    validations:
      required: true
  - type: input
    id: ase_skill_slug
    attributes:
      label: Related ASE skill slug, if any
      description: Use an existing public ASE slug only.
  - type: textarea
    id: safety
    attributes:
      label: Safety or trust concerns
      description: Note stale claims, ownership ambiguity, security concerns, or maintenance risk.
